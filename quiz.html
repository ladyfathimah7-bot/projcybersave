<section class="quiz-container">

            <p>Pertanyaan 1</p>

            <p>Pesan berikut aman atau scam?</p>

                "Selamat! Anda mendapatkan hadiah uang tunai,

                bit.ly/hadiah123

        </div>

        <div class="answer-box">

            <button onclick="cekJawaban(this,false)">

            <button onclick="cekJawaban(this,true)">

            <button onclick="cekJawaban(this,false)">
                Mungkin Aman
            </button>

            <button onclick="cekJawaban(this,false)">

    </div>
